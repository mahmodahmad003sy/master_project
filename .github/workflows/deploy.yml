name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}

    steps:
      - uses: actions/checkout@v4

      - id: meta
        shell: bash
        run: echo "image_name=ghcr.io/${GITHUB_REPOSITORY,,}/application" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_name }}:${{ github.sha }}
            ${{ steps.meta.outputs.image_name }}:latest

  deploy:
    runs-on:
      - self-hosted
      - linux
      - x64
    needs: publish
    env:
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy path
        shell: bash
        run: |
          if [ -z "$DEPLOY_PATH" ]; then
            echo "DEPLOY_PATH repository variable is required"
            exit 1
          fi

      - name: Prepare deployment files
        shell: bash
        run: |
          mkdir -p "$DEPLOY_PATH"
          cp docker-compose.yml "$DEPLOY_PATH/docker-compose.yml"
          cat > "$DEPLOY_PATH/.env.production" <<'EOF'
          ${{ secrets.PROD_ENV_FILE }}
          EOF
          cp "$DEPLOY_PATH/.env.production" "$DEPLOY_PATH/.env"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy on self-hosted runner
        shell: bash
        run: |
          cd "$DEPLOY_PATH"
          if docker compose version >/dev/null 2>&1; then
            compose() { docker compose "$@"; }
          elif command -v docker-compose >/dev/null 2>&1; then
            compose() { docker-compose "$@"; }
          else
            echo "Docker Compose is not installed on the self-hosted runner"
            exit 1
          fi

          APP_IMAGE="${{ needs.publish.outputs.image_name }}:latest" compose pull app
          compose up -d db
          compose rm -f -s app || true
          APP_IMAGE="${{ needs.publish.outputs.image_name }}:latest" compose up -d --no-deps app
          compose ps
          docker image prune -f
