name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}

    steps:
      - uses: actions/checkout@v4

      - id: meta
        shell: bash
        run: echo "image_name=ghcr.io/${GITHUB_REPOSITORY,,}/application" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_name }}:${{ github.sha }}
            ${{ steps.meta.outputs.image_name }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - uses: actions/checkout@v4

      - name: Create server app directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: mkdir -p "${{ secrets.SERVER_APP_DIR }}"

      - name: Upload compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          source: docker-compose.yml
          target: ${{ secrets.SERVER_APP_DIR }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            cat > "${{ secrets.SERVER_APP_DIR }}/.env.production" <<'EOF'
            ${{ secrets.PROD_ENV_FILE }}
            EOF
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            cd "${{ secrets.SERVER_APP_DIR }}"
            APP_IMAGE="${{ needs.publish.outputs.image_name }}:latest" docker compose --env-file .env.production pull app
            APP_IMAGE="${{ needs.publish.outputs.image_name }}:latest" docker compose --env-file .env.production up -d
            docker image prune -f
